<div class="container mt-5">

<h2 class="text-center">Confirm Payment</h2>

<div class="card p-4 mt-4">

<div class="row">
<div class="col-md-6">
<b>Name :</b> {{user?.name}}
</div>

<div class="col-md-6">
<b>Registration No :</b> {{user?.registrationNo}}
</div>
</div>

<div class="row mt-3">
<div class="col-md-6">
<b>Course :</b> {{user?.course}}
</div>

<div class="col-md-6">
<b>Fee :</b> ₹ {{user?.fee}}
</div>
</div>

<hr>

<div class="text-center mt-3">

<button class="btn btn-success" (click)="payNow()">
Pay ₹{{user.fee}}
</button>

</div>

</div>

</div>
